services:
  postgres:
    image: postgres:16-alpine
    container_name: idiomamate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-idiomamate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idiomamate}
      POSTGRES_DB: ${POSTGRES_DB:-idiomamate}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: idiomamate_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
