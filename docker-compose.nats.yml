services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idiomamate
      POSTGRES_PASSWORD: idiomamate
      POSTGRES_DB: idiomamate
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U idiomamate']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - '4222:4222'
      - '8222:8222'
    command: ['--http_port', '8222']
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8222/healthz']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      BROKER: nats
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://idiomamate:idiomamate@postgres:5432/idiomamate
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 2h
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not_configured}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-not_configured}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  matching:
    build:
      context: .
      dockerfile: apps/matching/Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      BROKER: nats
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      AGORA_APP_ID: ${AGORA_APP_ID:-placeholder_app_id}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-placeholder_certificate}
      DATABASE_URL: postgresql://idiomamate:idiomamate@postgres:5432/idiomamate
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  notification:
    build:
      context: .
      dockerfile: apps/notification/Dockerfile
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      BROKER: nats
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://idiomamate:idiomamate@postgres:5432/idiomamate
    depends_on:
      nats:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - '3030:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - '8080:8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

volumes:
  postgres_data:
  grafana_data:
