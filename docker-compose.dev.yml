# Local development — infrastructure only (no app containers).
# Start with: docker compose -f docker-compose.dev.yml up -d
# Then run services locally: pnpm start:dev api / matching / notification
#
# To also get NATS locally:
#   docker compose -f docker-compose.dev.yml --profile nats up -d
# To also get RabbitMQ locally:
#   docker compose -f docker-compose.dev.yml --profile rabbitmq up -d

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'

  nats:
    image: nats:2-alpine
    profiles: [nats]
    ports:
      - '4222:4222'
      - '8222:8222'
    command: ['--http_port', '8222']

  rabbitmq:
    image: rabbitmq:4-management-alpine
    profiles: [rabbitmq]
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes: {}
